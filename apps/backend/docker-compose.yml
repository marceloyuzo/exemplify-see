version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-exemplify-see
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev123
      POSTGRES_DB: exemplify-see
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
