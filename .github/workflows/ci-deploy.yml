name: CD - Deploy (Frontend Build + Backend Deploy)

on:
  push:
    branches:
      - "main"

jobs:
  build-frontend:
    name: Validar Build do Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js e Cache do Yarn
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Instalar dependências
        run: yarn install --frozen-lockfile

      - name: Build Frontend
        run: yarn workspace frontend-exemplify-see build

  build-and-push-backend:
    name: Build e Push do Backend (Docker Hub)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/backend/Dockerfile
          push: true
          tags: marceloitami/exemplify-see-backend:latest

  deploy-backend:
    name: Deploy do Backend na EC2
    runs-on: ubuntu-latest

    needs: [build-frontend, build-and-push-backend]

    steps:
      - name: SSH no servidor EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd /home/ec2-user/meu-app
            docker compose pull meu-backend
            docker compose up -d
            docker image prune -f
